name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-audit:
    name: Build + Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Lint + typecheck + build
        run: npm run build

      - name: Lighthouse CI (perf / a11y / best-practices / SEO >= 95)
        # Reads lighthouserc.json: serves ./dist statically, asserts each
        # category >= 0.95 (INVARIANT-04). Fails the PR if any category drops.
        run: npx --yes @lhci/cli@0.14.x autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
