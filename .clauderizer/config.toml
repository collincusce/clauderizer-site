[clauderizer]
version = "1"
size = "standard"
preflight_checks = ["branch_base", "clean_tree", "tests", "build", "deps_spotcheck", "branch_creation", "cascade_hygiene", "handoff_presence"]
preflight_advisory = []

[host]
profile = "node"
target = "claude-code"
session_host = "windows-wsl:Ubuntu"

[paths]
docs = "docs"
gameplans = "docs/gameplans"

[memory]
active_lessons_warn = 12
project_lessons_warn = 20

[modules]
enabled = ["VISION", "ARCHITECTURE", "DECISIONS", "INVARIANTS", "TESTING", "HARDENING"]

[rituals]
preflight = true
cascade = true
amendments = false

[active_gameplan]
id = ""
